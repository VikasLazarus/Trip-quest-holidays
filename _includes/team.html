<div class="w3-row">
    <div class="w3-content w3-padding">
      <h3 class="w3-large w3-margin-bottom"><b>Our Team</b></h3>
      <div class="w3-row slider-container w3-content">
        <button class="slider-btn prev-btn w3-hide" aria-label="Previous slide">‹</button>
        <div class="slider-track" style="gap: 20px;">

          {% assign filtered_items = site.team %}
          {% for post in filtered_items limit:5 %}
          <div class="slid" style="height: 260px; width: 100px;">
            <div class="w3-row" style="height: 100px; width: 100px;">
              <img alt="{{ post.name | default: 'Team Member' }}" src="{{site.url}}/assets/images/{{ post.image }}" class="w3-circle" style="object-fit:cover; overflow:hidden; width:100%; height:100%;">
            </div>
            <div class="w3-row">
              <div class="w3-text-dark-gray w3-center w3-small w3-margin-top">{{ post.name}}</div>
              <p class="w3-text-teal w3-tiny w3-center" style="margin-top: 3px;">{{ post.designation }}</p>
            </div>
          </div>
          {% endfor %}

          <div class="slid" style="height: 260px; width: 100px;">
            <div class="w3-row" style="height: 100px; width: 100px;">
              <img alt="Apply to join our team" src="{{site.url}}/assets/images/user.webp" class="w3-circle" style="object-fit:cover; overflow:hidden; width:100%; height:100%;">
            </div>
            <div class="w3-row">
              <div class="w3-text-dark-gray w3-center w3-small w3-margin-top">See Yourself Here</div>
              <p class="w3-text-teal w3-tiny w3-center" style="margin-top: 3px;">Apply Now</p>
            </div>
          </div>

        </div>
        <button class="slider-btn next-btn w3-hide" aria-label="Next slide">›</button>
      </div>
    </div>
  </div>
